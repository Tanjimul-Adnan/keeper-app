version: '3.8'
services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # Node.js Backend
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://mongodb:27017/keeper

  # React Frontend
  frontend:
    build: .
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo-data:
